name: Test Plugin Installation

on:
    push:
    pull_request:
    workflow_dispatch:

jobs:
    validate:
        name: Validate plugin structure
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Verify version sync between CORE_RULES.md and plugin.json
              run: |
                  rules_version=$(grep -oE '^\*\*Version:\*\* [0-9]+\.[0-9]+\.[0-9]+' CORE_RULES.md | awk '{print $2}' || true)
                  if [ -z "$rules_version" ]; then
                      echo "ERROR: CORE_RULES.md is missing or has a malformed '**Version:** X.Y.Z' line" >&2
                      exit 1
                  fi
                  plugin_version=$(jq -r '.version' .claude-plugin/plugin.json)
                  if [ "$rules_version" != "$plugin_version" ]; then
                      echo "ERROR: version mismatch — CORE_RULES.md says $rules_version, plugin.json says $plugin_version" >&2
                      exit 1
                  fi
                  echo "Version sync OK: $rules_version"

            - uses: actions/setup-node@v4
              with:
                  node-version: '24'

            - name: Install Claude Code
              run: npm install -g @anthropic-ai/claude-code

            - name: Validate marketplace and plugin manifests
              run: claude plugin validate .

    test-install:
        name: Test plugin installation
        runs-on: ubuntu-latest
        needs: validate
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v4
              with:
                  node-version: '24'

            - name: Install Claude Code
              run: npm install -g @anthropic-ai/claude-code

            - name: Configure git to use HTTPS
              run: git config --global url."https://github.com/".insteadOf "git@github.com:"

            - name: Add marketplace
              run: claude plugin marketplace add ./

            - name: List marketplaces
              run: claude plugin marketplace list

            - name: Install plugin
              run: claude plugin install agents-kit@drimchansky-agents-kit --scope user
